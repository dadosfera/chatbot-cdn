<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AutoDrive Chatbot Example</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f7fb;
        color: #111827;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(960px, calc(100vw - 48px));
        min-height: 560px;
        padding: 32px;
        border: 1px solid #dbe3ef;
        border-radius: 24px;
        background: #ffffff;
        box-shadow: 0 20px 60px rgb(15 23 42 / 10%);
      }

      .eyebrow {
        margin: 0 0 8px;
        color: #2563eb;
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 4vw, 3.5rem);
        line-height: 1;
      }

      p {
        max-width: 680px;
        color: #4b5563;
        line-height: 1.6;
      }

      #autodrive-chat {
        margin-top: 32px;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">AutoDrive Chatbot</p>
      <h1>Embed Example</h1>
      <p>
        This page demonstrates how to configure the AutoDrive widget in a client application.
        Replace the dataset, public key, and URL placeholders before using in a production environment.
      </p>

      <div id="autodrive-chat"></div>
    </main>

    <script>
      window.AppContext = {
        currentModule: "orders",
        currentEntityId: "order",
        userId: "user-demo",
        tenantId: "tenant-demo",
      };

      window.AutoDriveChatConfig = {
        container: "#autodrive-chat",
        client: "example-client",
        datasetId: "00000000-0000-0000-0000-000000000000",
        environment: "stg",
        tokenEndpoint: "/api/autodrive/chat-token",
        autodriveUrl: "https://autodrive-example.stg.dadosfera.ai",
        title: "Assistant",
        initialMessage: "Hello! How can I help you today?",
        placeholder: "Ask a question...",
        theme: {
          primaryColor: "#111827",
          accentColor: "#2563eb",
          position: "bottom-right",
          launcherLabel: "Open assistant",
        },
        uiContextProvider: function () {
          return {
            screen: window.location.pathname,
            module: window.AppContext.currentModule,
            entity: window.AppContext.currentEntityId,
          };
        },
        userContextProvider: function () {
          return {
            user_id: window.AppContext.userId,
            tenant_id: window.AppContext.tenantId,
          };
        },
        onExecutionRequest: function (request) {
          console.log("Structured payload received from AutoDrive:", request.payload);
        },
        onReady: function (instance) {
          console.log("AutoDrive Chatbot ready:", instance);
        },
        onError: function (error) {
          console.error("AutoDrive Chatbot error:", error);
        },
      };
    </script>

    <script>
      (function () {
        var bundleCandidates = [
          "https://raw.githubusercontent.com/dadosfera/chatbot-cdn/refs/heads/main/autodrive-chatbot.umd.cjs"
        ];

        async function loadBundleScript() {
          if (window.AutoDriveChat) return true;

          for (var i = 0; i < bundleCandidates.length; i += 1) {
            var url = bundleCandidates[i];

            try {
              var response = await fetch(url, { cache: "no-store" });
              if (!response.ok) continue;

              var code = await response.text();
              if (!code || !code.trim()) continue;

              var script = document.createElement("script");
              script.type = "text/javascript";
              script.text = code + "\n//# sourceURL=" + url;
              document.head.appendChild(script);

              if (window.AutoDriveChat) {
                console.log("Chatbot bundle loaded via fetch:", url);
                return true;
              }
            } catch (error) {
              console.warn("Failed to load bundle:", url, error);
            }
          }

          return false;
        }

        function mountChat() {
          if (!window.AutoDriveChat || !window.AutoDriveChatConfig) return false;
          if (document.querySelector("autodrive-chat")) return true;

          try {
            window.__adChatInstance = window.AutoDriveChat.init(window.AutoDriveChatConfig);
            console.log("AutoDrive Chatbot mounted successfully:", window.__adChatInstance);
            return true;
          } catch (error) {
            console.error("Failed to mount AutoDrive Chatbot:", error);
            return false;
          }
        }

        window.addEventListener("load", async function () {
          await loadBundleScript();
          if (mountChat()) return;

          // Fallback for slow/deferred loading scenarios.
          var tries = 0;
          var maxTries = 20;
          var timer = setInterval(async function () {
            tries += 1;
            if (!window.AutoDriveChat) {
              await loadBundleScript();
            }

            if (mountChat() || tries >= maxTries) {
              clearInterval(timer);
              if (tries >= maxTries && !document.querySelector("autodrive-chat")) {
                console.warn("AutoDrive Chatbot did not mount after fallback attempts.");
              }
            }
          }, 300);
        });
      })();
    </script>
    <!--
      Note:
      Loading is done via fetch + inline injection to work around MIME type
      blocking on some CDNs (e.g. application/node with strict MIME checking).
    -->
  </body>
</html>
